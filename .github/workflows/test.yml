name: tests

on:
  push:
    branches: [main]
    tags: ["v*"] # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request: {}
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.platform }} py${{ matrix.python-version }} ${{ matrix.resolution }}
    runs-on: ${{ matrix.platform }}
    env:
      # disable resyncing on uv run
      UV_NO_SYNC: "1"
      # test package pre-releases on cron-scheduled runs
      UV_PRERELEASE: ${{ github.event_name == 'schedule' && 'allow' || 'if-necessary-or-explicit' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        resolution: [highest, lowest-direct]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --resolution ${{ matrix.resolution }}

      - name: Test with pytest
        run: |
          uv run pytest --color=yes --cov=funtracks --cov-report=xml --cov-report=term-missing tests

      - name: Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: funkelab/funtracks

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      UV_NO_SYNC: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev --group testing

      - name: Retrieve cached baseline if available
        uses: actions/cache/restore@v5
        id: cache_baseline
        with:
          path: baseline.json
          key: benchmark-${{ github.event.pull_request.base.sha }}

      - name: Run baseline benchmark if not in cache
        if: steps.cache_baseline.outputs.cache-hit != 'true'
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          uv run pytest tests/benchmarks/bench_candidate_graph.py --benchmark-json baseline.json

      - name: Cache baseline results
        uses: actions/cache/save@v5
        if: steps.cache_baseline.outputs.cache-hit != 'true'
        with:
          path: baseline.json
          key: benchmark-${{ github.event.pull_request.base.sha }}

      - name: Run benchmark on PR head
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          uv run pytest tests/benchmarks/bench_candidate_graph.py --benchmark-json pr.json

      - name: Generate report
        run: uv run --with pandas --with tabulate python .github/workflows/benchmark_pr.py baseline.json pr.json report.md

      - name: Comment on commit with report
        uses: peter-evans/commit-comment@v3
        if: github.event.pull_request.head.repo.fork == false
        with:
          body-path: report.md
